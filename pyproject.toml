[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proto_tools"
version = "0.1.0"
description = "Bioinformatics tools for proto-language"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "Proto Bio Team"}
]

requires-python = ">=3.10"

[project.urls]
Repository = "https://github.com/evo-design/proto-tools"

# Core dependencies
dependencies = [
    # Core framework
    "pydantic>=2.0.0",

    # Scientific computing
    "numpy>=1.20",
    "pandas>=1.5",
    "pyarrow",  # Required for pandas parquet support (chai1 MSA conversion)

    # Bioinformatics
    "biopython",
    "biotite>=0.38.0",
    "gemmi",

    # Chemistry & structure
    "rdkit",
    "py3Dmol",

    # File parsing/indexing
    "pyfaidx",

    # Biology-specific tools
    "promotercalculator",

    # Visualization & utilities
    "matplotlib",
    "ipython",
    "ipymol",

    # Utilities
    "pyyaml",
    "requests",
    "tqdm",
]

[project.optional-dependencies]

# MCP server
mcp = [
    "fastmcp>=2.0.0",
]

# Development dependencies
dev = [
    # Testing
    "pytest>=7.3.0",        # --strict-markers requires 7.3+
    "pytest-asyncio>=0.21", # asyncio_mode="auto" requires 0.21+
    "pytest-cov>=4.1.0",
    "pytest-forked",        # Required on Sherlock (exclusive GPU process mode)


    # Code quality
    "ruff",
    "mypy",
    "pre-commit",

    # Notebooks & interactive
    "jupyter",
    "ipykernel",
    "ipywidgets",

    # Documentation
    "docstring-parser",
]

# Dependencies: Run tests from parent proto-language context (install.sh or pip install -e ..[dev])

[tool.pytest.ini_options]
# Run from proto-tools root directory
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "asyncio: mark test as requiring asyncio",
    "uses_gpu: mark test as requiring GPU. Optional arg: @pytest.mark.uses_gpu(n) skips unless n GPUs are visible",
    "uses_cpu: mark test as CPU-only",
    "slow: Slow tests that may take several minutes",
    "integration: Integration tests",
    "skip_ci: Skip test in GitHub Actions CI",
    "only_chimera: Test only runs on Chimera cluster (arc-slurm)",
    "exhaustive: Combinatorial tests (e.g., every tool × device transition). Skipped unless --exhaustive is passed",
    "include_in_env_report: Include test in --env-report (one smoke test per tool). Accepts optional kwargs: tool='tool_name', category='category_name'",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.ruff]
target-version = "py310"
line-length = 88
exclude = [
    "tool_envs",
    "*/tool_envs",
    "__pycache__",
    ".git",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
select = ["F401", "F841", "I"]

[tool.ruff.lint.per-file-ignores]
"**/standalone/standalone_helpers.py" = ["F401"]
"proto_tools/utils/standalone_helpers_source/standalone_helpers.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["proto_tools"]

[tool.setuptools.packages.find]
where = ["."]
include = ["proto_tools*"]

[tool.setuptools.package-data]
"*" = ["*.sh", "*.txt", "*.csv", "*.smi", "*.cif", "*.bib"]
