<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" role="img" aria-label="Input and Config together feed run_*(), which produces Output.">
  <style>
    .box       { fill: #F1F5F9; stroke: #94A3B8; stroke-opacity: 0.6; }
    .label     { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    .pill      { fill: #4B85E8; }
    .pilltext  { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; }
    .plus      { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 18px; font-weight: 600; }
    .connector { stroke: #94A3B8; stroke-opacity: 0.6; fill: none; }
    .arrow     { fill: #94A3B8; fill-opacity: 0.8; }
  </style>

  <rect x="0" y="0" width="620" height="160" fill="#ffffff" />

  <!-- inputs -->
  <rect x="24" y="26" width="120" height="40" rx="8" class="box" />
  <text x="84" y="51" text-anchor="middle" class="label">Input</text>
  <rect x="24" y="94" width="120" height="40" rx="8" class="box" />
  <text x="84" y="119" text-anchor="middle" class="label">Config</text>
  <text x="84" y="86" text-anchor="middle" class="plus">+</text>

  <!-- merge bus into run_*() -->
  <line x1="144" y1="46"  x2="200" y2="46"  class="connector" />
  <line x1="144" y1="114" x2="200" y2="114" class="connector" />
  <line x1="200" y1="46"  x2="200" y2="114" class="connector" />
  <line x1="200" y1="80"  x2="250" y2="80"  class="connector" />
  <polygon points="243,76 243,84 250,80" class="arrow" />

  <!-- the call -->
  <rect x="250" y="60" width="140" height="40" rx="8" class="pill" />
  <text x="320" y="85" text-anchor="middle" class="pilltext">run_*()</text>

  <!-- output -->
  <line x1="390" y1="80" x2="480" y2="80" class="connector" />
  <polygon points="473,76 473,84 480,80" class="arrow" />
  <rect x="480" y="60" width="120" height="40" rx="8" class="box" />
  <text x="540" y="85" text-anchor="middle" class="label">Output</text>
</svg>
