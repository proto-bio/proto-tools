name: Run Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      github.event_name == 'push' ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-integration') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /usr/local/share/boost /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: ${{ runner.os }}-uv-
    - uses: actions/cache@v4
      with:
        path: ~/.proto/.micromamba
        key: ${{ runner.os }}-micromamba
    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system ".[dev,mcp]"
    - run: pytest --integration --cpu
