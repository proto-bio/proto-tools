name: Run Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-integration-tests:
    if: >-
      github.event_name == 'push' ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-integration') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Cache micromamba binary
      uses: actions/cache@v4
      with:
        path: .micromamba
        key: ${{ runner.os }}-micromamba

    - name: Install package with dev dependencies
      run: |
        pip install uv
        uv pip install --system ".[dev,mcp]"

    - name: Run integration tests
      run: |
        pytest --integration --cpu
