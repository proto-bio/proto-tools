name: Integration Tests

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC (10pm PST)
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-integration') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /usr/local/share/boost /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        version: "0.11.8"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: actions/cache@v4
      with:
        path: ~/.proto/.micromamba
        key: ${{ runner.os }}-micromamba
    - name: Install dependencies
      run: uv pip install --system ".[dev]"
    - run: pytest --integration --cpu-only
