  url: https://github.com/ISYSLAB-HUST/SSAlign
  text: 'The upstream SSAlign repository (ISYSLAB-HUST/SSAlign) ships no LICENSE file; GitHub reports its license as null. This toolkit does not redistribute upstream code: it reimplements the published SSAlign method from permissively-licensed components (SaProt-650M_AF2 weights under MIT, and mini3di / affine-gaps / FAISS / transformers / biopython installed via pip). mini3di (GPL-3.0) is a pure-Python port of foldseek''s 3Di encoder used for 3Di extraction; no foldseek binary is bundled or run. Because upstream code-reuse terms are unstated, consult the authors before reusing the original SSAlign source. Treated conservatively here pending an explicit upstream license.'
