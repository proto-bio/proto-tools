notes: pdbeccdutils (PDBeurope/ccdutils) is Apache-2.0. The bundled wwPDB Chemical Component Dictionary data (`components.cif.gz`, ~70 MB) is dedicated to the public domain under CC0 1.0 per the wwPDB usage policies; attribution to the wwPDB is encouraged but not required. Optional UniChem cross-references and RCSB PDB usage queries hit external public APIs (EMBL-EBI UniChem, RCSB Search) whose own usage policies apply at request time.
