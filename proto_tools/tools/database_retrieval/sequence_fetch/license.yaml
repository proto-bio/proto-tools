code:
  spdx: Apache-2.0
  url: https://github.com/evo-design/proto-tools
bundled_dependencies:
  - name: NCBI Entrez
    tool: database_retrieval/ncbi
  - name: UniProt
    tool: database_retrieval/uniprot
  - name: RCSB PDB
    tool: database_retrieval/pdb
commercial_use: 'yes'
redistribution: true
attribution_required: false
notes: proto-tools original orchestration code (Apache-2.0) that federates over the NCBI Entrez, UniProt, and RCSB PDB sibling toolkits. Each underlying source carries its own data terms (NCBI public domain, UniProt CC-BY-4.0, RCSB CC0-1.0); attribution to UniProt is required when UniProt records are redistributed.
last_updated: '2026-05-19'
